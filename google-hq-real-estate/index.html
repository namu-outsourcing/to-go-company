<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google HQ Real Estate</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        google: {
                            blue: '#4285F4',
                            red: '#DB4437',
                            yellow: '#F4B400',
                            green: '#0F9D58',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Glassmorphism Utilities */
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Map Container */
        .map-container {
            height: 100vh;
            width: 100%;
            z-index: 0;
        }

        /* Custom Marker */
        .custom-price-marker div:hover {
            transform: scale(1.1);
            z-index: 1000;
        }

        /* Error Overlay */
        #error-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 0, 0.9);
            color: white;
            z-index: 9999;
            padding: 2rem;
            overflow: auto;
            font-family: monospace;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 overflow-hidden">
    <div id="root"></div>
    <div id="error-overlay"></div>

    <script>
        // Error Handler
        window.onerror = function (message, source, lineno, colno, error) {
            const overlay = document.getElementById('error-overlay');
            overlay.style.display = 'block';
            overlay.innerHTML += `<h3>Error:</h3><p>${message}</p><p>Line: ${lineno}</p><pre>${error ? error.stack : ''}</pre>`;
        };
    </script>

    <script type="text/babel">
        // --- Data ---
        const GOOGLE_HQ = [37.4220, -122.0841];
        const MOCK_PROPERTIES = [
            {
                id: 1,
                price: "$2,450,000",
                address: "1600 Amphitheatre Pkwy, Mountain View, CA",
                beds: 4,
                baths: 3,
                sqft: 2500,
                type: "House",
                lat: 37.4230,
                lng: -122.0855,
                image: "https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=800&q=80"
            },
            {
                id: 2,
                price: "$3,100,000",
                address: "123 Google Drive, Mountain View, CA",
                beds: 5,
                baths: 4,
                sqft: 3200,
                type: "Villa",
                lat: 37.4210,
                lng: -122.0830,
                image: "https://images.unsplash.com/photo-1613977257363-707ba9348227?auto=format&fit=crop&w=800&q=80"
            },
            {
                id: 3,
                price: "$1,850,000",
                address: "45 Charleston Rd, Mountain View, CA",
                beds: 3,
                baths: 2,
                sqft: 1800,
                type: "Apartment",
                lat: 37.4250,
                lng: -122.0810,
                image: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=800&q=80"
            }
        ];

        // --- Components ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const [svg, setSvg] = React.useState('');

            React.useEffect(() => {
                if (window.lucide && window.lucide.icons && window.lucide.icons[name]) {
                    const iconData = window.lucide.icons[name];
                    // lucide.icons[name] is an object with toSvg method in newer versions, 
                    // or checking older versions logic.
                    // safely allow basic SVG rendering.
                    try {
                        // The Lucide CDN exposes `lucide.createIcons` but individual icons might be under `lucide.icons`
                        // Let's debug by checking what's available or fallback to text.
                        const svgString = iconData.toSvg({
                            'class': className,
                            'width': size,
                            'height': size,
                            'stroke-width': 2
                        });
                        setSvg(svgString);
                    } catch (e) {
                        console.warn("Icon error", e);
                    }
                }
            }, [name, className, size]);

            if (!svg) return <span className="text-xs">{name}</span>;
            return <span dangerouslySetInnerHTML={{ __html: svg }} className="flex items-center justify-center" />;
        };

        const PropertyCard = ({ property, onClose }) => {
            if (!property) return null;

            return (
                <div className="absolute bottom-6 left-6 right-6 md:left-auto md:right-6 md:w-96 bg-white glass rounded-3xl p-0 shadow-2xl animate-fade-in z-[1000] overflow-hidden">
                    <div className="relative h-48">
                        <img
                            src={property.image}
                            alt={property.type}
                            className="w-full h-full object-cover"
                        />
                        <button
                            onClick={onClose}
                            className="absolute top-4 right-4 bg-black/50 hover:bg-black/70 text-white p-2 rounded-full backdrop-blur-sm transition"
                        >
                            <Icon name="X" size={20} />
                        </button>
                        <div className="absolute bottom-4 left-4 bg-black/60 text-white px-3 py-1 rounded-full text-sm font-medium backdrop-blur-sm">
                            {property.type}
                        </div>
                    </div>

                    <div className="p-6">
                        <h2 className="text-2xl font-bold text-gray-900">{property.price}</h2>
                        <p className="text-gray-500 text-sm mt-1">{property.address}</p>

                        <div className="flex gap-4 mt-6 text-gray-700">
                            <div className="flex items-center gap-2">
                                <Icon name="Bed" size={18} className="text-blue-500" />
                                <span className="font-medium">{property.beds}</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <Icon name="Bath" size={18} className="text-blue-500" />
                                <span className="font-medium">{property.baths}</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <Icon name="Square" size={18} className="text-blue-500" />
                                <span className="font-medium">{property.sqft}</span>
                            </div>
                        </div>

                        <div className="mt-8 flex gap-3">
                            <button className="flex-1 bg-gray-900 hover:bg-gray-800 text-white py-3 rounded-xl font-medium transition shadow-lg shadow-gray-200 active:scale-95">
                                View Details
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const MapComponent = ({ properties, onSelectProperty, selectedProperty }) => {
            const mapRef = React.useRef(null);
            const mapInstanceRef = React.useRef(null);
            const markersRef = React.useRef({});

            React.useEffect(() => {
                if (!mapRef.current || mapInstanceRef.current) return;

                const map = L.map(mapRef.current, {
                    zoomControl: false,
                    attributionControl: false
                }).setView(GOOGLE_HQ, 14);

                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
                    subdomains: 'abcd',
                    maxZoom: 20
                }).addTo(map);

                L.control.zoom({ position: 'bottomleft' }).addTo(map);

                // Google HQ Marker
                const googleIcon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div style="background-color: #EA4335; width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 0 0 4px rgba(234, 67, 53, 0.3);"></div>`,
                    iconSize: [20, 20],
                    iconAnchor: [10, 10]
                });

                L.marker(GOOGLE_HQ, { icon: googleIcon }).addTo(map)
                    .bindPopup("Google HQ")
                    .openPopup();

                mapInstanceRef.current = map;

                // Hack to force map resize after render
                setTimeout(() => map.invalidateSize(), 100);

                return () => {
                    if (mapInstanceRef.current) {
                        mapInstanceRef.current.remove();
                        mapInstanceRef.current = null;
                    }
                };
            }, []);

            React.useEffect(() => {
                if (!mapInstanceRef.current) return;

                const map = mapInstanceRef.current;

                // Clear existing markers
                Object.values(markersRef.current).forEach(marker => marker.remove());
                markersRef.current = {};

                properties.forEach(property => {
                    const isSelected = selectedProperty?.id === property.id;

                    const iconHtml = `
                        <div style="
                            background-color: ${isSelected ? '#1a73e8' : '#fff'};
                            color: ${isSelected ? '#fff' : '#1a73e8'};
                            padding: 6px 10px;
                            border-radius: 12px;
                            font-weight: bold;
                            font-family: sans-serif;
                            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
                            border: 2px solid #1a73e8;
                            white-space: nowrap;
                            font-size: 14px;
                            transition: all 0.2s ease;
                        ">
                            ${property.price}
                        </div>
                    `;

                    const icon = L.divIcon({
                        className: 'custom-price-marker',
                        html: iconHtml,
                        iconSize: [100, 30],
                        iconAnchor: [50, 40]
                    });

                    const marker = L.marker([property.lat, property.lng], { icon })
                        .addTo(map)
                        .on('click', () => {
                            onSelectProperty(property);
                            map.flyTo([property.lat, property.lng], 16, {
                                animate: true,
                                duration: 0.8
                            });
                        });

                    markersRef.current[property.id] = marker;
                });

            }, [properties, selectedProperty, onSelectProperty]);

            return <div ref={mapRef} className="map-container" />;
        };

        const Sidebar = ({ properties, onSelect, selectedId }) => {
            return (
                <div className="hidden md:flex flex-col w-96 h-screen bg-white/90 backdrop-blur-md border-r border-gray-200 z-[1000] overflow-hidden absolute top-0 left-0 shadow-2xl">
                    <div className="p-6 border-b border-gray-100 bg-white/50">
                        <h1 className="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-red-500">
                            G-RealEstate
                        </h1>
                        <p className="text-sm text-gray-500 mt-1">Properties near Googleplex</p>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 space-y-3">
                        {properties.map(property => (
                            <div
                                key={property.id}
                                onClick={() => onSelect(property)}
                                className={`
                                    p-3 rounded-2xl cursor-pointer transition flex gap-4 border
                                    ${selectedId === property.id
                                        ? 'bg-blue-50 border-blue-200 ring-1 ring-blue-300'
                                        : 'bg-white border-transparent hover:border-gray-200 hover:shadow-md'}
                                `}
                            >
                                <img
                                    src={property.image}
                                    className="w-24 h-24 rounded-xl object-cover"
                                    alt="Property"
                                />
                                <div className="flex flex-col justify-center">
                                    <h3 className="font-bold text-gray-900">{property.price}</h3>
                                    <p className="text-xs text-gray-500 truncate w-40">{property.address}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [selectedProperty, setSelectedProperty] = React.useState(null);

            return (
                <div className="relative w-full h-screen overflow-hidden font-sans">
                    <Sidebar
                        properties={MOCK_PROPERTIES}
                        onSelect={setSelectedProperty}
                        selectedId={selectedProperty?.id}
                    />

                    <div className="md:pl-96 w-full h-full relative">
                        <MapComponent
                            properties={MOCK_PROPERTIES}
                            onSelectProperty={setSelectedProperty}
                            selectedProperty={selectedProperty}
                        />

                        <PropertyCard
                            property={selectedProperty}
                            onClose={() => setSelectedProperty(null)}
                        />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
